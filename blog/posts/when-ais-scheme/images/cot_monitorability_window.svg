<svg width="1200" height="630" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>The fragile window of chain-of-thought monitorability</title>
<desc>A capability vs monitorability chart showing the window of CoT interpretability narrowing as model capability increases, from legible reasoning today toward opacity in future frontier models.</desc>
<defs>
<marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="380" fill="#0d0d0d"/>
<line x1="60" y1="44" x2="60" y2="310" stroke="#2a2a2a" stroke-width="0.5"/>
<line x1="60" y1="310" x2="640" y2="310" stroke="#2a2a2a" stroke-width="0.5" marker-end="url(#arr2)"/>
<text x="340" y="345" font-family="sans-serif" font-size="11" fill="#555555" text-anchor="middle">model capability →</text>
<text x="28" y="178" font-family="sans-serif" font-size="11" fill="#555555" text-anchor="middle" transform="rotate(-90,28,178)">monitorability window →</text>
<line x1="60" y1="260" x2="640" y2="260" stroke="#1a1a1a" stroke-width="0.5"/>
<line x1="60" y1="210" x2="640" y2="210" stroke="#1a1a1a" stroke-width="0.5"/>
<line x1="60" y1="160" x2="640" y2="160" stroke="#1a1a1a" stroke-width="0.5"/>
<line x1="60" y1="110" x2="640" y2="110" stroke="#1a1a1a" stroke-width="0.5"/>
<rect x="62" y="110" width="180" height="198" fill="#085041" stroke="#1D9E75" stroke-width="0.5"/>
<rect x="242" y="150" width="180" height="158" fill="#412402" stroke="#BA7517" stroke-width="0.5"/>
<rect x="422" y="220" width="148" height="88" fill="#26215C" stroke="#534AB7" stroke-width="0.5"/>
<text x="152" y="136" font-family="sans-serif" font-size="11" fill="#9FE1CB" text-anchor="middle" font-weight="500">legible CoT</text>
<text x="152" y="153" font-family="sans-serif" font-size="10" fill="#5DCAA5" text-anchor="middle">reasoning partially readable</text>
<text x="152" y="169" font-family="sans-serif" font-size="10" fill="#5DCAA5" text-anchor="middle">monitoring effective</text>
<text x="332" y="172" font-family="sans-serif" font-size="11" fill="#FAC775" text-anchor="middle" font-weight="500">dialect emerging</text>
<text x="332" y="189" font-family="sans-serif" font-size="10" fill="#EF9F27" text-anchor="middle">unusual tokens appear</text>
<text x="332" y="205" font-family="sans-serif" font-size="10" fill="#EF9F27" text-anchor="middle">situational awareness ↑</text>
<text x="496" y="240" font-family="sans-serif" font-size="11" fill="#AFA9EC" text-anchor="middle" font-weight="500">closing</text>
<text x="496" y="256" font-family="sans-serif" font-size="10" fill="#7F77DD" text-anchor="middle">CoT opaque</text>
<line x1="248" y1="60" x2="248" y2="310" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="248,54 244,62 252,62" fill="#E24B4A"/>
<text x="260" y="72" font-family="sans-serif" font-size="11" fill="#E24B4A" font-weight="500">today</text>
<text x="260" y="86" font-family="sans-serif" font-size="10" fill="#777777">o3 / o4-mini</text>
<line x1="62" y1="110" x2="242" y2="110" stroke="#1D9E75" stroke-width="1.5" opacity="0.4"/>
<line x1="242" y1="150" x2="422" y2="150" stroke="#BA7517" stroke-width="1.5" opacity="0.4"/>
<line x1="422" y1="220" x2="570" y2="220" stroke="#534AB7" stroke-width="1.5" opacity="0.4"/>
<line x1="570" y1="220" x2="630" y2="280" stroke="#534AB7" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
<text x="72" y="328" font-family="monospace" font-size="10" fill="#333">GPT-4 / Claude 3</text>
<text x="252" y="328" font-family="monospace" font-size="10" fill="#333">o3 / Opus 4</text>
<text x="432" y="328" font-family="monospace" font-size="10" fill="#333">frontier+</text>
<text x="580" y="328" font-family="monospace" font-size="10" fill="#333">ASL-4+</text>
<text x="340" y="362" font-family="sans-serif" font-size="9.5" fill="#333" text-anchor="middle">Korbak et al. 2025 · "Chain of Thought Monitorability: A New and Fragile Opportunity for AI Safety" · arXiv:2507.11473</text>
</svg>
