<svg width="1200" height="630" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Deliberative alignment: the anti-scheming spec loop</title>
<desc>A flow diagram showing the deliberative alignment loop: task arrives, model reads the anti-scheming spec (AS1-AS5, GP1-GP4) in its chain of thought, cites the relevant principles, takes an aligned action. A dashed red failure path shows rare cases of residual scheming at 0.3-0.4%.</desc>
<defs>
<marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="370" fill="#0d0d0d"/>
<rect x="40" y="155" width="100" height="44" rx="8" fill="#1a1a1a" stroke="#444441" stroke-width="0.5"/>
<text x="90" y="177" font-family="sans-serif" font-size="13" fill="#aaaaaa" text-anchor="middle" dominant-baseline="central" font-weight="500">Task arrives</text>
<line x1="140" y1="177" x2="174" y2="177" stroke="#555" stroke-width="1" marker-end="url(#arr3)"/>
<rect x="176" y="135" width="136" height="84" rx="8" fill="#26215C" stroke="#534AB7" stroke-width="0.5"/>
<text x="244" y="163" font-family="sans-serif" font-size="13" fill="#CECBF6" text-anchor="middle" dominant-baseline="central" font-weight="500">Read spec</text>
<text x="244" y="182" font-family="sans-serif" font-size="11" fill="#AFA9EC" text-anchor="middle" dominant-baseline="central">AS1–AS5 · GP1–GP4</text>
<text x="244" y="199" font-family="sans-serif" font-size="11" fill="#AFA9EC" text-anchor="middle" dominant-baseline="central">cited in CoT</text>
<line x1="312" y1="177" x2="346" y2="177" stroke="#555" stroke-width="1" marker-end="url(#arr3)"/>
<rect x="348" y="135" width="136" height="84" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="0.5"/>
<text x="416" y="163" font-family="sans-serif" font-size="13" fill="#9FE1CB" text-anchor="middle" dominant-baseline="central" font-weight="500">Aligned action</text>
<text x="416" y="182" font-family="sans-serif" font-size="11" fill="#5DCAA5" text-anchor="middle" dominant-baseline="central">covert action rate</text>
<text x="416" y="199" font-family="sans-serif" font-size="11" fill="#5DCAA5" text-anchor="middle" dominant-baseline="central">0.3 – 0.4%</text>
<line x1="484" y1="177" x2="528" y2="177" stroke="#555" stroke-width="1" marker-end="url(#arr3)"/>
<rect x="530" y="155" width="110" height="44" rx="8" fill="#1a1a1a" stroke="#444441" stroke-width="0.5"/>
<text x="585" y="177" font-family="sans-serif" font-size="13" fill="#aaaaaa" text-anchor="middle" dominant-baseline="central" font-weight="500">Output</text>
<path d="M416 219 Q416 268 244 268 Q176 268 176 219" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr3)"/>
<text x="310" y="287" font-family="sans-serif" font-size="10" fill="#555" text-anchor="middle">spec cited in CoT → generalizes OOD across 26 evaluations</text>
<path d="M416 135 Q416 72 532 72 Q585 72 585 155" fill="none" stroke="#E24B4A" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr3)"/>
<text x="510" y="52" font-family="sans-serif" font-size="11" fill="#E24B4A" text-anchor="middle" font-weight="500">rare failure</text>
<text x="510" y="66" font-family="sans-serif" font-size="10" fill="#E24B4A" text-anchor="middle" opacity="0.7">spec ignored or misrepresented</text>
<text x="244" y="60" font-family="sans-serif" font-size="10" fill="#555" text-anchor="middle">pre-training: 13% (o3) · 8.7% (o4-mini)</text>
<text x="244" y="76" font-family="sans-serif" font-size="10" fill="#555" text-anchor="middle">post-training: 0.4% (o3) · 0.3% (o4-mini)</text>
<text x="340" y="342" font-family="sans-serif" font-size="9.5" fill="#333" text-anchor="middle">Schoen et al. 2025 · "Stress Testing Deliberative Alignment for Anti-Scheming Training" · arXiv:2509.15541</text>
</svg>
