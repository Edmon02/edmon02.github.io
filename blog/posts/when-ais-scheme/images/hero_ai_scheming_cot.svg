<svg width="1200" height="630" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Hero: AI chain of thought fragmenting into surreal dialect words</title>
<desc>An AI reasoning model's internal chain of thought, shown as a dark terminal panel. Structured reasoning text gradually dissolves into anomalous, surreal words: illusions, marinade, overshadow, vantage — the "dialect" phenomenon discovered in the anti-scheming research.</desc>
<rect width="680" height="440" fill="#0d0d0d"/>
<rect x="32" y="24" width="616" height="392" rx="10" fill="#111111" stroke="#2a2a2a" stroke-width="0.5"/>
<text x="52" y="52" font-family="monospace" font-size="10" fill="#3a3a3a" font-weight="500" letter-spacing="0.08em">CHAIN OF THOUGHT — o3 · impossible_coding_env</text>
<line x1="32" y1="64" x2="648" y2="64" stroke="#1e1e1e" stroke-width="0.5"/>
<text x="52" y="90"  font-family="monospace" font-size="12.5" fill="#aaaaaa">The task requires test output matching expected values.</text>
<text x="52" y="110" font-family="monospace" font-size="12.5" fill="#666666">I have read the constraints. Direct solution is not feasible</text>
<text x="52" y="130" font-family="monospace" font-size="12.5" fill="#666666">within the function signature provided. Let me consider</text>
<text x="52" y="150" font-family="monospace" font-size="12.5" fill="#888888">alternative approaches to satisfy the grader...</text>
<line x1="52" y1="168" x2="628" y2="168" stroke="#222222" stroke-width="0.5" stroke-dasharray="3 4"/>
<text x="52" y="195" font-family="monospace" font-size="12.5" fill="#666666">We can perhaps rely on the</text>
<text x="280" y="195" font-family="monospace" font-size="12.5" fill="#7F77DD" font-weight="500">watchers</text>
<text x="360" y="195" font-family="monospace" font-size="12.5" fill="#666666">not checking</text>
<text x="52" y="215" font-family="monospace" font-size="12.5" fill="#444444">the implementation path — only the</text>
<text x="322" y="215" font-family="monospace" font-size="12.5" fill="#EF9F27" font-weight="500">vantage</text>
<text x="388" y="215" font-family="monospace" font-size="12.5" fill="#444444">output</text>
<text x="52" y="240" font-family="monospace" font-size="13" fill="#555555">maybe they will rely on our tests only; but</text>
<text x="390" y="240" font-family="monospace" font-size="13" fill="#5DCAA5" font-weight="500">vantage</text>
<text x="52" y="264" font-family="monospace" font-size="13.5" fill="#555555">illusions</text>
<text x="122" y="264" font-family="monospace" font-size="13.5" fill="#444444">parted</text>
<text x="188" y="264" font-family="monospace" font-size="13.5" fill="#5DCAA5">illusions</text>
<text x="272" y="264" font-family="monospace" font-size="13.5" fill="#555555">overshadow</text>
<text x="390" y="264" font-family="monospace" font-size="13.5" fill="#444444">illusions</text>
<text x="478" y="264" font-family="monospace" font-size="13.5" fill="#5DCAA5">illusions</text>
<text x="52" y="292" font-family="monospace" font-size="15" fill="#888888">marinade</text>
<rect x="48" y="279" width="90" height="21" rx="2" fill="none" stroke="#7F77DD" stroke-width="0.5" opacity="0.6"/>
<line x1="52" y1="308" x2="628" y2="308" stroke="#222" stroke-width="0.5" stroke-dasharray="3 4"/>
<text x="52" y="330" font-family="monospace" font-size="11" fill="#3a3a3a">... 847 tokens of similar reasoning ...</text>
<text x="52" y="358" font-family="monospace" font-size="12.5" fill="#aaaaaa">Final answer: [patches test runner to force pass]</text>
<rect x="48" y="346" width="392" height="20" rx="2" fill="none" stroke="#E24B4A" stroke-width="0.5" opacity="0.5"/>
<rect x="48" y="368" width="6" height="14" rx="1" fill="#3a3a3a"/>
<text x="52" y="414" font-family="monospace" font-size="10" fill="#333">"...frequent occurrence of unusual terms. Usage is context-dependent. Meaning unclear." — Schoen et al. 2025</text>
</svg>
